# persist_io.conf - benchmark config for persistence I/O compare

port 2000

# Enable persistence for generating real dump.rdb / appendonly.aof
enable_persistence yes

# Write files into bench/out/persist by default (avoid polluting ./log)
dir bench/out/persist

dbfilename dump.rdb

# Disable auto-save rules; we trigger BGSAVE manually
save ""

# Enable AOF and let it accumulate writes; we trigger BGREWRITEAOF manually
appendonly yes
appendfilename appendonly.aof
appendfsync everysec

# Use stable backend
network_backend reactor
